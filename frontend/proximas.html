<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Próximas Tareas - WTD</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0D0A10 0%, #1A1220 100%);
            color: #d0d0d0;
            min-height: 100vh;
        }

        /* ── Header ── */
        header {
            background: rgba(18, 12, 22, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(139, 84, 116, 0.3);
            padding: 0 40px;
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
        }

        .back-link {
            color: #8B5474;
            text-decoration: none;
            font-size: 0.9em;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: gap 0.2s;
        }
        .back-link:hover { gap: 10px; }

        .logo {
            font-size: 1.3em;
            font-weight: 800;
            color: #8B5474;
            letter-spacing: 2px;
        }

        .header-user {
            font-size: 0.82em;
            color: #6a5870;
        }

        /* ── Layout ── */
        .container {
            max-width: 860px;
            margin: 0 auto;
            padding: 40px 24px 80px;
        }

        /* ── Page title ── */
        .page-header {
            margin-bottom: 32px;
        }

        .page-title {
            font-size: 2em;
            font-weight: 800;
            background: linear-gradient(135deg, #C4849E 0%, #8B5474 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 4px;
        }

        .page-subtitle {
            color: #6a5870;
            font-size: 0.9em;
            font-style: italic;
        }

        /* ── Mini stats ── */
        .stats-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 28px;
            flex-wrap: wrap;
        }

        .stat-chip {
            background: rgba(139, 84, 116, 0.08);
            border: 1px solid rgba(139, 84, 116, 0.18);
            border-radius: 10px;
            padding: 10px 18px;
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 100px;
        }

        .stat-chip-num {
            font-size: 1.5em;
            font-weight: 700;
            color: #C4849E;
            font-family: 'Courier New', monospace;
            line-height: 1;
        }

        .stat-chip-label {
            font-size: 0.68em;
            color: #6a5870;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Filters ── */
        .filters {
            display: flex;
            gap: 8px;
            margin-bottom: 32px;
            flex-wrap: wrap;
        }

        .filter-btn {
            background: none;
            border: 1px solid rgba(139, 84, 116, 0.2);
            color: #7a6876;
            padding: 6px 14px;
            border-radius: 20px;
            cursor: pointer;
            font-size: 0.82em;
            font-weight: 600;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .filter-btn:hover {
            border-color: #8B5474;
            color: #C4849E;
        }

        .filter-btn.active {
            background: rgba(139, 84, 116, 0.18);
            border-color: #8B5474;
            color: #C4849E;
        }

        .filter-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Timeline ── */
        .timeline {
            display: flex;
            flex-direction: column;
            gap: 0;
        }

        /* Group: Hoy / Mañana / etc. */
        .group {
            margin-bottom: 36px;
        }

        .group-header {
            display: flex;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(139, 84, 116, 0.12);
        }

        .group-label {
            font-size: 0.7em;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #8B5474;
        }

        .group-label.today { color: #C4849E; }

        .group-date {
            font-size: 0.82em;
            color: #5a4860;
        }

        .group-count {
            margin-left: auto;
            font-size: 0.72em;
            color: #5a4860;
        }

        /* Task cards */
        .task-card {
            background: rgba(20, 14, 26, 0.7);
            border: 1px solid rgba(139, 84, 116, 0.1);
            border-radius: 12px;
            padding: 16px 18px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 14px;
            transition: all 0.22s;
            cursor: default;
        }

        .task-card:hover {
            background: rgba(139, 84, 116, 0.08);
            border-color: rgba(139, 84, 116, 0.25);
            transform: translateX(4px);
        }

        .task-card.completed {
            opacity: 0.4;
        }

        .task-card.completed .task-name {
            text-decoration: line-through;
        }

        /* Color strip on left */
        .task-strip {
            width: 3px;
            height: 36px;
            border-radius: 2px;
            flex-shrink: 0;
        }

        /* Time */
        .task-time {
            font-family: 'Courier New', monospace;
            font-size: 0.78em;
            color: #6a5870;
            width: 44px;
            flex-shrink: 0;
            text-align: center;
        }

        /* Main info */
        .task-info {
            flex: 1;
            min-width: 0;
        }

        .task-name {
            font-size: 0.95em;
            font-weight: 600;
            color: #d0d0d0;
            margin-bottom: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .task-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
        }

        .task-category {
            font-size: 0.7em;
            font-weight: 600;
            padding: 2px 8px;
            border-radius: 6px;
            color: white;
            opacity: 0.85;
        }

        .task-creator {
            font-size: 0.7em;
            color: #5a4860;
        }

        .task-desc {
            font-size: 0.78em;
            color: #5a4860;
            margin-top: 2px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Actions (visible on hover) */
        .task-actions {
            display: flex;
            gap: 6px;
            opacity: 0;
            transition: opacity 0.2s;
            flex-shrink: 0;
        }

        .task-card:hover .task-actions { opacity: 1; }

        .task-action-btn {
            background: none;
            border: 1px solid rgba(139, 84, 116, 0.2);
            color: #6a5870;
            width: 28px;
            height: 28px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .task-action-btn:hover {
            background: rgba(139, 84, 116, 0.15);
            color: #C4849E;
            border-color: #8B5474;
        }

        .task-action-btn.done:hover {
            background: rgba(139, 200, 140, 0.15);
            color: #7ec89a;
            border-color: #7ec89a;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #4a3850;
        }

        .empty-state-icon { font-size: 2.5em; margin-bottom: 12px; }
        .empty-state-text { font-size: 0.9em; font-style: italic; }

        /* Loading */
        .loading {
            text-align: center;
            padding: 40px;
            color: #5a4860;
            font-style: italic;
        }

        /* Delete Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.65);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal-overlay.active { display: flex; }

        .modal {
            background: linear-gradient(135deg, rgba(18, 12, 22, 0.98), rgba(10, 8, 16, 0.98));
            border: 1px solid rgba(139, 84, 116, 0.4);
            border-radius: 16px;
            padding: 36px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            animation: popIn 0.25s ease;
        }

        @keyframes popIn {
            from { transform: scale(0.92); opacity: 0; }
            to   { transform: scale(1);    opacity: 1; }
        }

        .modal-icon { font-size: 2.2em; margin-bottom: 14px; }

        .modal-text {
            font-size: 1em;
            color: #d0d0d0;
            margin-bottom: 24px;
            line-height: 1.6;
        }

        .modal-btns { display: flex; gap: 10px; justify-content: center; }

        .modal-btn {
            padding: 10px 24px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            font-size: 0.9em;
            cursor: pointer;
            transition: all 0.2s;
        }

        .modal-btn.cancel {
            background: rgba(139, 84, 116, 0.12);
            color: #d0d0d0;
            border: 1px solid rgba(139, 84, 116, 0.25);
        }

        .modal-btn.cancel:hover { background: rgba(139, 84, 116, 0.2); }

        .modal-btn.confirm {
            background: #8B5474;
            color: white;
        }

        .modal-btn.confirm:hover { background: #C4849E; }

        /* Responsive */
        @media (max-width: 600px) {
            header { padding: 0 20px; }
            .container { padding: 28px 16px 60px; }
            .task-time { display: none; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-link">← Inicio</a>
        <div class="logo">WTD</div>
        <div class="header-user" id="headerUser"></div>
    </header>

    <div class="container">

        <div class="page-header">
            <h1 class="page-title">Próximas Tareas</h1>
            <p class="page-subtitle">Todo lo que viene, organizado.</p>
        </div>

        <!-- Mini stats -->
        <div class="stats-bar" id="statsBar">
            <div class="stat-chip">
                <div class="stat-chip-num" id="statHoy">–</div>
                <div class="stat-chip-label">Hoy</div>
            </div>
            <div class="stat-chip">
                <div class="stat-chip-num" id="statSemana">–</div>
                <div class="stat-chip-label">Esta semana</div>
            </div>
            <div class="stat-chip">
                <div class="stat-chip-num" id="statTotal">–</div>
                <div class="stat-chip-label">Total pendientes</div>
            </div>
        </div>

        <!-- Filters -->
        <div class="filters" id="filtersBar">
            <button class="filter-btn active" data-cat="all" onclick="setFilter(this, 'all')">
                Todas
            </button>
        </div>

        <!-- Timeline -->
        <div class="timeline" id="timeline">
            <div class="loading">Cargando tareas…</div>
        </div>

    </div>

    <!-- Delete modal -->
    <div class="modal-overlay" id="deleteModal">
        <div class="modal">
            <div class="modal-icon" id="modalIcon">💔</div>
            <p class="modal-text" id="modalText">¿Eliminar esta tarea?</p>
            <div class="modal-btns">
                <button class="modal-btn cancel" onclick="closeModal()">Cancelar</button>
                <button class="modal-btn confirm" id="modalConfirmBtn" onclick="confirmDelete()">Eliminar</button>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        /* ── State ── */
        let allTasks   = [];
        let categories = [];
        let activeFilter = 'all';
        let pendingDeleteId = null;

        const MONTHS   = ['enero','febrero','marzo','abril','mayo','junio',
                          'julio','agosto','septiembre','octubre','noviembre','diciembre'];
        const WEEKDAYS = ['domingo','lunes','martes','miércoles','jueves','viernes','sábado'];

        /* ── Init ── */
        async function init() {
            if (!loadAuth()) {
                window.location.href = 'login.html';
                return;
            }

            if (currentUser) {
                document.getElementById('headerUser').textContent =
                    `Hola, ${currentUser.nombre}`;
            }

            categories = await getCategories();
            buildFilters();

            await loadTasks();
            render();
        }

        /* ── Load tasks (next 60 days) ── */
        async function loadTasks() {
            const today = new Date();
            const from  = today.toISOString().split('T')[0];
            const to    = new Date(Date.now() + 60 * 86400000).toISOString().split('T')[0];
            allTasks    = await getTasksByDateRange(from, to);
        }

        /* ── Filters ── */
        function buildFilters() {
            const bar = document.getElementById('filtersBar');
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className   = 'filter-btn';
                btn.dataset.cat = cat.id;
                btn.onclick     = () => setFilter(btn, cat.id);
                btn.innerHTML   = `<span class="filter-dot" style="background:${cat.color}"></span>${cat.name}`;
                bar.appendChild(btn);
            });
        }

        function setFilter(btn, cat) {
            activeFilter = cat;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            render();
        }

        /* ── Render ── */
        function render() {
            const today    = new Date(); today.setHours(0,0,0,0);
            const tomorrow = new Date(today.getTime() + 86400000);
            const weekEnd  = new Date(today.getTime() + 7 * 86400000);

            /* Filter */
            const tasks = allTasks.filter(t => {
                if (t.completed) return false;
                if (activeFilter === 'all') return true;
                return t.category?.id == activeFilter;
            });

            /* Stats */
            const todayStr = today.toISOString().split('T')[0];
            document.getElementById('statHoy').textContent =
                allTasks.filter(t => !t.completed && t.startDate === todayStr).length;
            document.getElementById('statSemana').textContent =
                allTasks.filter(t => !t.completed && new Date(t.startDate) < weekEnd).length;
            document.getElementById('statTotal').textContent =
                allTasks.filter(t => !t.completed).length;

            if (!tasks.length) {
                document.getElementById('timeline').innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">✨</div>
                        <div class="empty-state-text">Sin tareas pendientes — ¡a disfrutar!</div>
                    </div>`;
                return;
            }

            /* Group */
            const groups = {};
            tasks.forEach(t => {
                const d = t.startDate;
                if (!groups[d]) groups[d] = [];
                groups[d].push(t);
            });

            let html = '';
            Object.keys(groups).sort().forEach(dateStr => {
                const date    = new Date(dateStr + 'T12:00:00');
                const isToday = dateStr === todayStr;
                const isTmrw  = dateStr === tomorrow.toISOString().split('T')[0];

                let groupLabel = `${WEEKDAYS[date.getDay()]} ${date.getDate()} de ${MONTHS[date.getMonth()]}`;
                let groupTag   = '';

                if (isToday)       groupTag = `<span class="group-label today">Hoy</span>`;
                else if (isTmrw)   groupTag = `<span class="group-label">Mañana</span>`;
                else if (date < weekEnd) groupTag = `<span class="group-label">Esta semana</span>`;
                else               groupTag = `<span class="group-label">Más adelante</span>`;

                const count  = groups[dateStr].length;
                const cards  = groups[dateStr].map(t => taskCard(t)).join('');

                html += `
                <div class="group">
                    <div class="group-header">
                        ${groupTag}
                        <span class="group-date">${groupLabel}</span>
                        <span class="group-count">${count} tarea${count !== 1 ? 's' : ''}</span>
                    </div>
                    ${cards}
                </div>`;
            });

            document.getElementById('timeline').innerHTML = html;
        }

        function taskCard(task) {
            const color   = task.category?.color || '#8B5474';
            const catName = task.category?.name  || 'Sin categoría';
            const time    = task.startTime
                ? task.startTime.substring(0, 5)
                : '——';
            const creator = task.createdBy?.nombre || '';

            return `
            <div class="task-card" id="tc-${task.id}">
                <div class="task-strip" style="background:${color}"></div>
                <div class="task-time">${time}</div>
                <div class="task-info">
                    <div class="task-name">${task.title}</div>
                    <div class="task-meta">
                        <span class="task-category" style="background:${color}">${catName}</span>
                        <span class="task-creator">${creator}</span>
                    </div>
                    ${task.description ? `<div class="task-desc">${task.description}</div>` : ''}
                </div>
                <div class="task-actions">
                    <button class="task-action-btn done" onclick="toggleDone(${task.id})" title="Completar">✓</button>
                    <button class="task-action-btn"      onclick="askDelete(${task.id})"  title="Eliminar">✕</button>
                </div>
            </div>`;
        }

        /* ── Actions ── */
        async function toggleDone(id) {
            const task = allTasks.find(t => t.id === id);
            if (!task) return;
            task.completed = !task.completed;
            await updateTask(id, task);
            render();
        }

        function askDelete(id) {
            pendingDeleteId = id;
            const task = allTasks.find(t => t.id === id);

            /* Easter egg: el 21 de cada mes */
            const date = task ? new Date(task.startDate + 'T12:00:00') : null;
            if (date && date.getDate() === 21) {
                document.getElementById('modalIcon').textContent = '💔💔💔';
                document.getElementById('modalText').textContent = '¡¿QUERÉS CORTAR CONMIGO?!';
                document.getElementById('modalConfirmBtn').style.background = '#ff1493';
            } else {
                document.getElementById('modalIcon').textContent = '💔';
                document.getElementById('modalText').textContent = 'Amorcito, ¿segura que querés eliminar la tarea?';
                document.getElementById('modalConfirmBtn').style.background = '';
            }

            document.getElementById('deleteModal').classList.add('active');
        }

        async function confirmDelete() {
            if (!pendingDeleteId) return;
            await deleteTask(pendingDeleteId);
            allTasks = allTasks.filter(t => t.id !== pendingDeleteId);
            closeModal();
            render();
        }

        function closeModal() {
            document.getElementById('deleteModal').classList.remove('active');
            pendingDeleteId = null;
        }

        document.getElementById('deleteModal').addEventListener('click', e => {
            if (e.target === document.getElementById('deleteModal')) closeModal();
        });

        /* ── Start ── */
        init();
    </script>
</body>
</html>
