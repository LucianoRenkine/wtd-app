<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - WTD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0D0A10 0%, #1A1220 100%);
            color: #d0d0d0;
            line-height: 1.6;
        }

        header {
            background: rgba(18, 12, 22, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #8B5474;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 20px rgba(139, 84, 116, 0.1);
        }

        .logo {
            font-size: 1.6em;
            font-weight: 800;
            color: #8B5474;
            letter-spacing: 1px;
        }

        .user-info {
            color: #d0d0d0;
            font-size: 0.9em;
        }

        .hamburger {
            background: none;
            border: none;
            color: #8B5474;
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 5px;
            padding: 4px;
        }
        .hamburger span {
            display: block;
            width: 25px;
            height: 2px;
            background: #8B5474;
            border-radius: 2px;
            transition: all 0.3s;
        }
        .hamburger.active span:nth-child(1) { transform: rotate(45deg) translate(10px, 10px); }
        .hamburger.active span:nth-child(2) { opacity: 0; }
        .hamburger.active span:nth-child(3) { transform: rotate(-45deg) translate(7px, -7px); }

        .sidebar {
            position: fixed;
            left: -300px;
            top: 0;
            width: 300px;
            height: 100vh;
            background: linear-gradient(180deg, #1A1220 0%, #0D0A10 100%);
            border-right: 1px solid rgba(139, 84, 116, 0.3);
            padding: 80px 20px 30px;
            transition: left 0.3s ease;
            z-index: 200;
            overflow-y: auto;
        }
        .sidebar.active { left: 0; }
        .sidebar nav ul { list-style: none; }
        .sidebar nav li { margin-bottom: 20px; }
        .sidebar nav a {
            text-decoration: none;
            color: #d0d0d0;
            font-size: 1.05em;
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px;
            border-radius: 5px;
            transition: all 0.3s;
        }
        .sidebar nav a:hover { color: #8B5474; background: rgba(139, 84, 116, 0.1); padding-left: 15px; }
        .sidebar nav a.active { color: #8B5474; font-weight: 600; background: rgba(139, 84, 116, 0.15); }
        .sidebar-divider { border: none; border-top: 1px solid rgba(139, 84, 116, 0.2); margin: 20px 10px; }
        .sidebar nav a.logout-link { color: #a06070; }
        .sidebar nav a.logout-link:hover { color: #e07090; background: rgba(180, 80, 100, 0.12); }

        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            opacity: 0;
            visibility: hidden;
            transition: all 0.3s;
            z-index: 150;
        }
        .sidebar-overlay.active { opacity: 1; visibility: visible; }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 2.5em;
            color: #d0d0d0;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1px;
        }

        .calendar-wrapper {
            display: grid;
            grid-template-columns: 1fr 320px;
            gap: 24px;
            align-items: start;
        }

        /* ── Calendar macOS style ── */
        .calendar-section {
            background: rgba(13, 9, 18, 0.7);
            border: 1px solid rgba(139, 84, 116, 0.2);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(8px);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 24px 16px;
            border-bottom: 1px solid rgba(139, 84, 116, 0.15);
        }

        .current-month {
            font-size: 1.6em;
            font-weight: 700;
            color: #d0d0d0;
            letter-spacing: -0.3px;
        }

        .calendar-nav {
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .calendar-nav button {
            background: rgba(139, 84, 116, 0.12);
            border: 1px solid rgba(139, 84, 116, 0.25);
            color: #8B5474;
            cursor: pointer;
            transition: all 0.2s;
            border-radius: 6px;
            font-size: 1em;
            padding: 5px 11px;
            line-height: 1;
        }

        .calendar-nav button:hover {
            background: rgba(139, 84, 116, 0.25);
            border-color: #8B5474;
        }

        .calendar-nav .today-btn {
            font-size: 0.82em;
            font-weight: 600;
            padding: 5px 12px;
            letter-spacing: 0.3px;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .day-header {
            text-align: center;
            color: #555;
            font-size: 0.72em;
            font-weight: 700;
            padding: 8px 0 6px;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            border-bottom: 1px solid rgba(139, 84, 116, 0.15);
            border-right: 1px solid rgba(139, 84, 116, 0.08);
        }
        .day-header:last-child { border-right: none; }

        .day-cell {
            min-height: 108px;
            display: flex;
            flex-direction: column;
            padding: 6px 5px 4px;
            border-right: 1px solid rgba(139, 84, 116, 0.1);
            border-bottom: 1px solid rgba(139, 84, 116, 0.1);
            cursor: pointer;
            transition: background 0.15s;
            vertical-align: top;
            overflow: hidden;
        }
        .day-cell:nth-child(7n) { border-right: none; }
        .day-cell:hover { background: rgba(139, 84, 116, 0.07); }

        .day-num {
            font-size: 0.82em;
            font-weight: 500;
            color: #888;
            width: 24px;
            height: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            margin-bottom: 3px;
            align-self: flex-end;
            flex-shrink: 0;
        }

        .day-cell.today .day-num {
            background: #8B5474;
            color: white;
            font-weight: 700;
        }

        .day-cell.other-month { background: rgba(0,0,0,0.18); cursor: default; }
        .day-cell.other-month .day-num { color: #3a3a3a; }
        .day-cell.other-month:hover { background: rgba(0,0,0,0.18); }

        .day-cell.selected { background: rgba(139, 84, 116, 0.1); }
        .day-cell.selected .day-num { outline: 1px solid #8B5474; }

        .event-pill {
            display: block;
            padding: 2px 5px;
            border-radius: 3px;
            font-size: 0.68em;
            color: white;
            margin-bottom: 2px;
            overflow: hidden;
            white-space: nowrap;
            text-overflow: ellipsis;
            font-weight: 500;
            line-height: 1.5;
            opacity: 0.92;
        }

        .event-more {
            font-size: 0.65em;
            color: #666;
            padding: 1px 5px;
        }

        /* ── Right panel sticky ── */
        .right-panel {
            position: sticky;
            top: 80px;
            background: rgba(13, 9, 18, 0.7);
            border: 1px solid rgba(139, 84, 116, 0.2);
            border-radius: 12px;
            overflow: hidden;
            backdrop-filter: blur(8px);
            max-height: calc(100vh - 100px);
            display: flex;
            flex-direction: column;
        }

        /* ── Tabs ── */
        .tab-bar {
            display: grid;
            grid-template-columns: 1fr 1fr;
            border-bottom: 1px solid rgba(139, 84, 116, 0.2);
            flex-shrink: 0;
        }
        .tab-btn {
            background: none;
            border: none;
            color: #666;
            padding: 14px 10px;
            font-size: 0.82em;
            font-weight: 600;
            cursor: pointer;
            letter-spacing: 0.3px;
            transition: all 0.2s;
            border-bottom: 2px solid transparent;
            font-family: inherit;
        }
        .tab-btn:hover { color: #8B5474; background: rgba(139, 84, 116, 0.05); }
        .tab-btn.active {
            color: #C4849E;
            border-bottom-color: #8B5474;
            background: rgba(139, 84, 116, 0.07);
        }
        .tab-pane { display: none; padding: 20px; overflow-y: auto; flex: 1; }
        .tab-pane.active { display: block; }

        .form-section {
            /* kept for compat but now used inside tab-pane */
        }

        .form-section h3 {
            color: #d0d0d0;
            margin-bottom: 16px;
            font-size: 1.05em;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #8B5474;
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group textarea,
        .form-group select,
        .form-group time-input {
            width: 100%;
            padding: 10px;
            background: rgba(5, 2, 10, 0.4);
            border: 2px solid rgba(139, 84, 116, 0.2);
            border-radius: 8px;
            color: #d0d0d0;
            font-family: inherit;
            font-size: 0.9em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #8B5474;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #8B5474 0%, #C4849E 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            font-size: 0.9em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(139, 84, 116, 0.3);
        }

        .tasks-list {
            margin-top: 30px;
        }

        .tasks-list h3 {
            color: #d0d0d0;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .task-item {
            background: rgba(5, 2, 10, 0.3);
            padding: 15px;
            border-left: 4px solid #8B5474;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.3s;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-weight: 600;
            color: #d0d0d0;
            margin-bottom: 3px;
        }

        .task-category {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            color: white;
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-btn {
            background: rgba(139, 84, 116, 0.3);
            border: 1px solid #8B5474;
            color: #8B5474;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .task-btn:hover {
            background: #8B5474;
            color: white;
        }

        .no-tasks {
            color: #666;
            text-align: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .error {
            background: rgba(139, 84, 116, 0.2);
            border: 2px solid #8B5474;
            color: #C4849E;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .calendar-wrapper {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8em;
            }

            .day-cell {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <button class="hamburger" id="hamburger"><span></span><span></span><span></span></button>
        <div class="logo">WTD - Calendario</div>
        <div class="user-info" id="userInfo">Cargando...</div>
    </header>

    <div class="sidebar" id="sidebar">
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="calendar.html" class="active">Agenda</a></li>
                <li><a href="proximas.html">Próximas Tareas</a></li>
                <li><a href="#">Watchlist</a></li>
                <hr class="sidebar-divider">
                <li><a href="#" class="logout-link" onclick="doLogout(event)">⏻ Cerrar sesión</a></li>
            </ul>
        </nav>
    </div>
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <div class="container">
        <div id="errorMessage" class="error" style="display:none;"></div>

        <div class="calendar-wrapper">
            <!-- Calendar -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <div class="current-month" id="currentMonth">Cargando...</div>
                    <div class="calendar-nav">
                        <button id="prevBtn">‹</button>
                        <button id="todayBtn" class="today-btn">Hoy</button>
                        <button id="nextBtn">›</button>
                    </div>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <div class="loading">Cargando calendario...</div>
                </div>
            </div>

            <!-- Right Panel (sticky, tabbed) -->
            <div class="right-panel">
                <div class="tab-bar">
                    <button class="tab-btn active" id="tabBtnTasks" onclick="showTab('tasks')">📅 Tareas del día</button>
                    <button class="tab-btn" id="tabBtnForm" onclick="showTab('form')">+ Nueva tarea</button>
                </div>

                <!-- Tab: Tareas del día -->
                <div class="tab-pane active" id="tabPaneTasks">
                    <h3 id="selectedDateTitle">Tareas del día</h3>
                    <div id="tasksList" class="tasks-list">
                        <div class="no-tasks">Selecciona un día para ver sus tareas</div>
                    </div>
                </div>

                <!-- Tab: Nueva tarea -->
                <div class="tab-pane" id="tabPaneForm">
                    <h3>Nueva Tarea</h3>
                    <form id="taskForm">
                        <div class="form-group">
                            <label>Título *</label>
                            <input type="text" id="taskTitle" required placeholder="Ingresa una tarea">
                        </div>
                        <div class="form-group">
                            <label>Descripción</label>
                            <textarea id="taskDescription" placeholder="Detalles..."></textarea>
                        </div>
                        <div class="form-group">
                            <label>Fecha *</label>
                            <input type="date" id="taskDate" required>
                        </div>
                        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
                            <div class="form-group">
                                <label>Hora inicio</label>
                                <input type="time" id="taskStartTime">
                            </div>
                            <div class="form-group">
                                <label>Hora fin</label>
                                <input type="time" id="taskEndTime">
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Categoría *</label>
                            <select id="taskCategory" required>
                                <option value="">Cargando categorías...</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Prioridad</label>
                            <select id="taskPriority">
                                <option value="MEDIUM">Normal</option>
                                <option value="LOW">Baja</option>
                                <option value="HIGH">Alta</option>
                            </select>
                        </div>
                        <button type="submit" class="btn">Agregar Tarea</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        /* ── Hamburger ── */
        const hamburger      = document.getElementById('hamburger');
        const sidebar        = document.getElementById('sidebar');
        const sidebarOverlay = document.getElementById('sidebarOverlay');

        hamburger.addEventListener('click', () => {
            hamburger.classList.toggle('active');
            sidebar.classList.toggle('active');
            sidebarOverlay.classList.toggle('active');
        });
        sidebarOverlay.addEventListener('click', () => {
            hamburger.classList.remove('active');
            sidebar.classList.remove('active');
            sidebarOverlay.classList.remove('active');
        });

        function doLogout(e) {
            e.preventDefault();
            localStorage.removeItem('wtdAuth');
            window.location.href = 'login.html';
        }

        /* ── Tabs ── */
        function showTab(name) {
            document.getElementById('tabPaneTasks').classList.toggle('active', name === 'tasks');
            document.getElementById('tabPaneForm').classList.toggle('active', name === 'form');
            document.getElementById('tabBtnTasks').classList.toggle('active', name === 'tasks');
            document.getElementById('tabBtnForm').classList.toggle('active', name === 'form');
        }

        // State
        let currentDate = new Date();
        let selectedDate = new Date();
        let allTasks = [];
        let categories = [];

        // Initialize
        async function init() {
            if (!loadAuth()) {
                window.location.href = 'index.html';
                return;
            }

            // Set today's date as default
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('taskDate').value = today;

            // Load categories
            await loadCategories();

            // Load tasks
            await loadTasks();

            // Render calendar
            renderCalendar();
            renderTasksForSelectedDate();

            // Update user info
            if (currentUser) {
                document.getElementById('userInfo').textContent = `Hola, ${currentUser.nombre}`;
            }
        }

        async function loadCategories() {
            categories = await getCategories();
            const categorySelect = document.getElementById('taskCategory');
            if (categories.length > 0) {
                categorySelect.innerHTML = categories.map(cat =>
                    `<option value="${cat.id}">${cat.name}</option>`
                ).join('');
            }
        }

        async function loadTasks() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const from = new Date(year, month, 1).toISOString().split('T')[0];
            const to = new Date(year, month + 1, 0).toISOString().split('T')[0];

            allTasks = await getTasksByDateRange(from, to);
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Update month display (bold month + muted year)
            const monthNames = ['Enero','Febrero','Marzo','Abril','Mayo','Junio',
                'Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            document.getElementById('currentMonth').innerHTML =
                `${monthNames[month]} <span style="color:#554466;font-weight:400">${year}</span>`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Day headers — Monday first
            const dayHeaders = ['Lun','Mar','Mié','Jue','Vie','Sáb','Dom'];
            dayHeaders.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                grid.appendChild(header);
            });

            // First day of month — convert to Monday-first (0=Mon … 6=Sun)
            const rawFirst = new Date(year, month, 1).getDay(); // 0=Sun
            const firstDay = (rawFirst + 6) % 7;                 // 0=Mon

            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = firstDay - 1; i >= 0; i--) {
                grid.appendChild(createDayCell(prevMonthDays - i, true, -1));
            }

            // Current month days
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                grid.appendChild(createDayCell(i, false, 0));
            }

            // Fill remaining cells to complete last row
            const totalCells = grid.children.length - 7; // subtract header row
            const remainder = totalCells % 7;
            if (remainder !== 0) {
                for (let i = 1; i <= 7 - remainder; i++) {
                    grid.appendChild(createDayCell(i, true, 1));
                }
            }
        }

        function createDayCell(day, otherMonth, monthOffset) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const date = new Date(year, month + monthOffset, day);

            // Day number bubble
            const dayNum = document.createElement('div');
            dayNum.className = 'day-num';
            dayNum.textContent = day;
            cell.appendChild(dayNum);

            if (otherMonth) {
                cell.classList.add('other-month');
            } else {
                const dayStr = date.toISOString().split('T')[0];

                // Today?
                if (dayStr === new Date().toISOString().split('T')[0]) {
                    cell.classList.add('today');
                }

                // Selected?
                if (dayStr === selectedDate.toISOString().split('T')[0]) {
                    cell.classList.add('selected');
                }

                // Event pills
                const dayTasks = allTasks.filter(t => t.startDate === dayStr);
                const MAX_PILLS = 3;
                dayTasks.slice(0, MAX_PILLS).forEach(task => {
                    const pill = document.createElement('div');
                    pill.className = 'event-pill';
                    pill.style.backgroundColor = task.category?.color || '#8B5474';
                    const time = task.startTime ? task.startTime.substring(0,5) + ' ' : '';
                    pill.textContent = time + task.title;
                    pill.title = task.title;
                    cell.appendChild(pill);
                });
                if (dayTasks.length > MAX_PILLS) {
                    const more = document.createElement('div');
                    more.className = 'event-more';
                    more.textContent = `+${dayTasks.length - MAX_PILLS} más`;
                    cell.appendChild(more);
                }

                // Click handler — switch to tasks tab automatically
                cell.addEventListener('click', () => {
                    selectedDate = date;
                    renderCalendar();
                    renderTasksForSelectedDate();
                    showTab('tasks');
                });
            }

            return cell;
        }

        function renderTasksForSelectedDate() {
            const selectedStr = selectedDate.toISOString().split('T')[0];
            const dayTasks = allTasks.filter(t => t.startDate === selectedStr);

            const monthNames = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
                'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            const dayNames = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];

            const dateStr = `${dayNames[selectedDate.getDay()]} ${selectedDate.getDate()} de ${monthNames[selectedDate.getMonth()]}`;
            document.getElementById('selectedDateTitle').textContent = `Tareas del ${dateStr}`;

            const tasksList = document.getElementById('tasksList');
            if (dayTasks.length === 0) {
                tasksList.innerHTML = '<div class="no-tasks">No hay tareas para este día</div>';
                return;
            }

            tasksList.innerHTML = dayTasks.map((task, idx) => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        ${task.startTime ? `<small style="color: #999;">${task.startTime}${task.endTime ? ` - ${task.endTime}` : ''}</small><br>` : ''}
                        <span class="task-category" style="background-color: ${task.category?.color || '#999'}">${task.category?.name || 'Sin categoría'}</span>
                    </div>
                    <div class="task-actions">
                        <button class="task-btn" onclick="toggleTask(${task.id})">✓</button>
                        <button class="task-btn" onclick="deleteTaskConfirm(${task.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleTask(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                const updated = await updateTask(taskId, task);
                if (updated) {
                    renderTasksForSelectedDate();
                }
            }
        }

        async function deleteTaskConfirm(taskId) {
            if (confirm('¿Eliminar esta tarea?')) {
                const deleted = await deleteTask(taskId);
                if (deleted) {
                    allTasks = allTasks.filter(t => t.id !== taskId);
                    renderCalendar();
                    renderTasksForSelectedDate();
                }
            }
        }

        // Form submission
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newTask = {
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                startDate: document.getElementById('taskDate').value,
                startTime: document.getElementById('taskStartTime').value || null,
                endTime: document.getElementById('taskEndTime').value || null,
                category: { id: document.getElementById('taskCategory').value },
                priority: document.getElementById('taskPriority').value,
                completed: false,
                createdBy: { id: currentUserId }
            };

            const created = await createTask(newTask);
            if (created) {
                allTasks.push(created);
                document.getElementById('taskForm').reset();
                document.getElementById('taskDate').value = new Date().toISOString().split('T')[0];
                renderCalendar();
                renderTasksForSelectedDate();
            }
        });

        // Navigation
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            loadTasks().then(() => renderCalendar());
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            loadTasks().then(() => renderCalendar());
        });

        document.getElementById('todayBtn').addEventListener('click', () => {
            currentDate = new Date();
            selectedDate = new Date();
            loadTasks().then(() => { renderCalendar(); renderTasksForSelectedDate(); });
        });

        // Start
        init();
    </script>
</body>
</html>
