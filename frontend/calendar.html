<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendario - WTD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0f0f 0%, #1a1a1a 100%);
            color: #d0d0d0;
            line-height: 1.6;
        }

        header {
            background: rgba(26, 26, 26, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 2px solid #c41e3a;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 2px 20px rgba(196, 30, 58, 0.1);
        }

        .logo {
            font-size: 1.6em;
            font-weight: 800;
            color: #c41e3a;
            letter-spacing: 1px;
        }

        .user-info {
            color: #d0d0d0;
            font-size: 0.9em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 20px;
        }

        .page-title {
            font-size: 2.5em;
            color: #d0d0d0;
            margin-bottom: 40px;
            text-align: center;
            letter-spacing: 1px;
        }

        .calendar-wrapper {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .calendar-section {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(15, 15, 15, 0.8) 100%);
            border: 2px solid rgba(196, 30, 58, 0.2);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(5px);
        }

        .calendar-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .calendar-nav button {
            background: none;
            border: none;
            color: #c41e3a;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s;
            padding: 5px 10px;
        }

        .calendar-nav button:hover {
            transform: scale(1.2);
        }

        .current-month {
            font-size: 1.3em;
            color: #d0d0d0;
            font-weight: 600;
        }

        .calendar-grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .day-header {
            text-align: center;
            color: #999;
            font-size: 0.85em;
            font-weight: 600;
            padding: 10px 0;
            letter-spacing: 1px;
        }

        .day-cell {
            aspect-ratio: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 2px solid rgba(196, 30, 58, 0.2);
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: 500;
            color: #d0d0d0;
            padding: 5px;
            font-size: 0.9em;
        }

        .day-cell:hover {
            border-color: #c41e3a;
            background: rgba(196, 30, 58, 0.1);
        }

        .day-cell.other-month {
            color: #555;
            cursor: default;
        }

        .day-cell.today {
            background: #c41e3a;
            border-color: #c41e3a;
            color: white;
            font-weight: bold;
        }

        .day-cell.selected {
            background: rgba(196, 30, 58, 0.3);
            border-color: #c41e3a;
        }

        .task-indicators {
            display: flex;
            gap: 2px;
            margin-top: 2px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .task-dot {
            width: 4px;
            height: 4px;
            border-radius: 50%;
        }

        .form-section {
            background: linear-gradient(135deg, rgba(26, 26, 26, 0.8) 0%, rgba(15, 15, 15, 0.8) 100%);
            border: 2px solid rgba(196, 30, 58, 0.2);
            border-radius: 15px;
            padding: 30px;
            backdrop-filter: blur(5px);
        }

        .form-section h3 {
            color: #d0d0d0;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .form-group {
            margin-bottom: 15px;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #c41e3a;
            font-weight: 600;
            font-size: 0.9em;
        }

        .form-group input,
        .form-group textarea,
        .form-group select,
        .form-group time-input {
            width: 100%;
            padding: 10px;
            background: rgba(0, 0, 0, 0.3);
            border: 2px solid rgba(196, 30, 58, 0.2);
            border-radius: 8px;
            color: #d0d0d0;
            font-family: inherit;
            font-size: 0.9em;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus,
        .form-group select:focus {
            outline: none;
            border-color: #c41e3a;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 60px;
        }

        .btn {
            background: linear-gradient(135deg, #c41e3a 0%, #ff6b7a 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
            font-size: 0.9em;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(196, 30, 58, 0.3);
        }

        .tasks-list {
            margin-top: 30px;
        }

        .tasks-list h3 {
            color: #d0d0d0;
            margin-bottom: 15px;
            font-size: 1.2em;
        }

        .task-item {
            background: rgba(0, 0, 0, 0.2);
            padding: 15px;
            border-left: 4px solid #c41e3a;
            border-radius: 8px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 10px;
            transition: all 0.3s;
        }

        .task-item.completed {
            opacity: 0.6;
        }

        .task-item.completed .task-title {
            text-decoration: line-through;
        }

        .task-content {
            flex: 1;
            min-width: 0;
        }

        .task-title {
            font-weight: 600;
            color: #d0d0d0;
            margin-bottom: 3px;
        }

        .task-category {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.75em;
            color: white;
            font-weight: 600;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .task-btn {
            background: rgba(196, 30, 58, 0.3);
            border: 1px solid #c41e3a;
            color: #c41e3a;
            padding: 5px 8px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.8em;
            transition: all 0.3s;
        }

        .task-btn:hover {
            background: #c41e3a;
            color: white;
        }

        .no-tasks {
            color: #666;
            text-align: center;
            padding: 20px;
        }

        .loading {
            text-align: center;
            color: #999;
            padding: 20px;
        }

        .error {
            background: rgba(196, 30, 58, 0.2);
            border: 2px solid #c41e3a;
            color: #ff6b7a;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        @media (max-width: 1024px) {
            .calendar-wrapper {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 1.8em;
            }

            .day-cell {
                font-size: 0.8em;
            }
        }
    </style>
</head>
<body>
    <header>
        <a href="index.html" style="color: #c41e3a; text-decoration: none;">← Volver</a>
        <div class="logo">WTD - Calendario</div>
        <div class="user-info" id="userInfo">Cargando...</div>
    </header>

    <div class="container">
        <h1 class="page-title">Mi Calendario</h1>

        <div id="errorMessage" class="error" style="display:none;"></div>

        <div class="calendar-wrapper">
            <!-- Calendar -->
            <div class="calendar-section">
                <div class="calendar-header">
                    <button id="prevBtn">‹</button>
                    <div class="current-month" id="currentMonth">Cargando...</div>
                    <button id="nextBtn">›</button>
                </div>
                <div class="calendar-grid" id="calendarGrid">
                    <div class="loading">Cargando calendario...</div>
                </div>
            </div>

            <!-- Right Panel -->
            <div style="display: flex; flex-direction: column; gap: 30px;">
                <!-- Add Task Form -->
                <div class="form-section">
                    <h3>Nueva Tarea</h3>
                    <form id="taskForm">
                        <div class="form-group">
                            <label>Título *</label>
                            <input type="text" id="taskTitle" required placeholder="Ingresa una tarea">
                        </div>

                        <div class="form-group">
                            <label>Descripción</label>
                            <textarea id="taskDescription" placeholder="Detalles..."></textarea>
                        </div>

                        <div class="form-group">
                            <label>Fecha *</label>
                            <input type="date" id="taskDate" required>
                        </div>

                        <div class="form-group">
                            <label>Hora Inicio</label>
                            <input type="time" id="taskStartTime">
                        </div>

                        <div class="form-group">
                            <label>Hora Fin</label>
                            <input type="time" id="taskEndTime">
                        </div>

                        <div class="form-group">
                            <label>Categoría *</label>
                            <select id="taskCategory" required>
                                <option value="">Cargando categorías...</option>
                            </select>
                        </div>

                        <div class="form-group">
                            <label>Prioridad</label>
                            <select id="taskPriority">
                                <option value="MEDIUM">Normal</option>
                                <option value="LOW">Baja</option>
                                <option value="HIGH">Alta</option>
                            </select>
                        </div>

                        <button type="submit" class="btn">Agregar Tarea</button>
                    </form>
                </div>

                <!-- Tasks for Selected Date -->
                <div class="form-section">
                    <h3 id="selectedDateTitle">Tareas del Hoy</h3>
                    <div id="tasksList" class="tasks-list">
                        <div class="no-tasks">Selecciona un día para ver tareas</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        // State
        let currentDate = new Date();
        let selectedDate = new Date();
        let allTasks = [];
        let categories = [];

        // Initialize
        async function init() {
            if (!loadAuth()) {
                window.location.href = 'index.html';
                return;
            }

            // Set today's date as default
            const today = new Date().toISOString().split('T')[0];
            document.getElementById('taskDate').value = today;

            // Load categories
            await loadCategories();

            // Load tasks
            await loadTasks();

            // Render calendar
            renderCalendar();
            renderTasksForSelectedDate();

            // Update user info
            if (currentUser) {
                document.getElementById('userInfo').textContent = `Hola, ${currentUser.nombre}`;
            }
        }

        async function loadCategories() {
            categories = await getCategories();
            const categorySelect = document.getElementById('taskCategory');
            if (categories.length > 0) {
                categorySelect.innerHTML = categories.map(cat =>
                    `<option value="${cat.id}">${cat.name}</option>`
                ).join('');
            }
        }

        async function loadTasks() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const from = new Date(year, month, 1).toISOString().split('T')[0];
            const to = new Date(year, month + 1, 0).toISOString().split('T')[0];

            allTasks = await getTasksByDateRange(from, to);
        }

        function renderCalendar() {
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();

            // Update month display
            const monthNames = ['Enero', 'Febrero', 'Marzo', 'Abril', 'Mayo', 'Junio',
                'Julio', 'Agosto', 'Septiembre', 'Octubre', 'Noviembre', 'Diciembre'];
            document.getElementById('currentMonth').textContent = `${monthNames[month]} ${year}`;

            const grid = document.getElementById('calendarGrid');
            grid.innerHTML = '';

            // Day headers
            const dayHeaders = ['Dom', 'Lun', 'Mar', 'Mié', 'Jue', 'Vie', 'Sáb'];
            dayHeaders.forEach(day => {
                const header = document.createElement('div');
                header.className = 'day-header';
                header.textContent = day;
                grid.appendChild(header);
            });

            // First day of month
            const firstDay = new Date(year, month, 1).getDay();

            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = firstDay - 1; i >= 0; i--) {
                const cell = createDayCell(prevMonthDays - i, true);
                grid.appendChild(cell);
            }

            // Current month days
            const daysInMonth = new Date(year, month + 1, 0).getDate();
            for (let i = 1; i <= daysInMonth; i++) {
                const cell = createDayCell(i, false);
                grid.appendChild(cell);
            }

            // Next month days
            const totalCells = grid.children.length - 7;
            const remainingCells = 35 - totalCells;
            for (let i = 1; i <= remainingCells; i++) {
                const cell = createDayCell(i, true);
                grid.appendChild(cell);
            }
        }

        function createDayCell(day, otherMonth) {
            const cell = document.createElement('div');
            cell.className = 'day-cell';

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth();
            const date = new Date(year, month, day);

            if (otherMonth) {
                cell.classList.add('other-month');
                cell.textContent = day;
            } else {
                const dayStr = date.toISOString().split('T')[0];

                // Check if today
                const today = new Date().toISOString().split('T')[0];
                if (dayStr === today) {
                    cell.classList.add('today');
                }

                // Check if selected
                const selectedStr = selectedDate.toISOString().split('T')[0];
                if (dayStr === selectedStr) {
                    cell.classList.add('selected');
                }

                // Add day number
                const dayNum = document.createElement('div');
                dayNum.textContent = day;
                cell.appendChild(dayNum);

                // Add task indicators
                const dayTasks = allTasks.filter(t => t.startDate === dayStr);
                if (dayTasks.length > 0) {
                    const indicators = document.createElement('div');
                    indicators.className = 'task-indicators';
                    dayTasks.slice(0, 3).forEach(task => {
                        const dot = document.createElement('div');
                        dot.className = 'task-dot';
                        dot.style.backgroundColor = task.category?.color || '#c41e3a';
                        indicators.appendChild(dot);
                    });
                    cell.appendChild(indicators);
                }

                // Click handler
                cell.addEventListener('click', () => {
                    selectedDate = date;
                    renderCalendar();
                    renderTasksForSelectedDate();
                });
            }

            return cell;
        }

        function renderTasksForSelectedDate() {
            const selectedStr = selectedDate.toISOString().split('T')[0];
            const dayTasks = allTasks.filter(t => t.startDate === selectedStr);

            const monthNames = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio',
                'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
            const dayNames = ['domingo', 'lunes', 'martes', 'miércoles', 'jueves', 'viernes', 'sábado'];

            const dateStr = `${dayNames[selectedDate.getDay()]} ${selectedDate.getDate()} de ${monthNames[selectedDate.getMonth()]}`;
            document.getElementById('selectedDateTitle').textContent = `Tareas del ${dateStr}`;

            const tasksList = document.getElementById('tasksList');
            if (dayTasks.length === 0) {
                tasksList.innerHTML = '<div class="no-tasks">No hay tareas para este día</div>';
                return;
            }

            tasksList.innerHTML = dayTasks.map((task, idx) => `
                <div class="task-item ${task.completed ? 'completed' : ''}">
                    <div class="task-content">
                        <div class="task-title">${task.title}</div>
                        ${task.startTime ? `<small style="color: #999;">${task.startTime}${task.endTime ? ` - ${task.endTime}` : ''}</small><br>` : ''}
                        <span class="task-category" style="background-color: ${task.category?.color || '#999'}">${task.category?.name || 'Sin categoría'}</span>
                    </div>
                    <div class="task-actions">
                        <button class="task-btn" onclick="toggleTask(${task.id})">✓</button>
                        <button class="task-btn" onclick="deleteTaskConfirm(${task.id})">✕</button>
                    </div>
                </div>
            `).join('');
        }

        async function toggleTask(taskId) {
            const task = allTasks.find(t => t.id === taskId);
            if (task) {
                task.completed = !task.completed;
                const updated = await updateTask(taskId, task);
                if (updated) {
                    renderTasksForSelectedDate();
                }
            }
        }

        async function deleteTaskConfirm(taskId) {
            if (confirm('¿Eliminar esta tarea?')) {
                const deleted = await deleteTask(taskId);
                if (deleted) {
                    allTasks = allTasks.filter(t => t.id !== taskId);
                    renderCalendar();
                    renderTasksForSelectedDate();
                }
            }
        }

        // Form submission
        document.getElementById('taskForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const newTask = {
                title: document.getElementById('taskTitle').value,
                description: document.getElementById('taskDescription').value,
                startDate: document.getElementById('taskDate').value,
                startTime: document.getElementById('taskStartTime').value || null,
                endTime: document.getElementById('taskEndTime').value || null,
                category: { id: document.getElementById('taskCategory').value },
                priority: document.getElementById('taskPriority').value,
                completed: false,
                createdBy: { id: currentUserId }
            };

            const created = await createTask(newTask);
            if (created) {
                allTasks.push(created);
                document.getElementById('taskForm').reset();
                document.getElementById('taskDate').value = new Date().toISOString().split('T')[0];
                renderCalendar();
                renderTasksForSelectedDate();
            }
        });

        // Navigation
        document.getElementById('prevBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() - 1);
            loadTasks().then(() => renderCalendar());
        });

        document.getElementById('nextBtn').addEventListener('click', () => {
            currentDate.setMonth(currentDate.getMonth() + 1);
            loadTasks().then(() => renderCalendar());
        });

        // Start
        init();
    </script>
</body>
</html>
