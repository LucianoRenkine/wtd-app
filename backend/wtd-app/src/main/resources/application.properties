# Servidor
server.port=${PORT:8080}
server.servlet.context-path=/api

# PostgreSQL — usa variables de entorno en producción, fallback local para desarrollo
spring.datasource.url=${DATABASE_URL:jdbc:postgresql://localhost:5432/wtd-db}
spring.datasource.username=${DATABASE_USERNAME:postgres}
spring.datasource.password=${DATABASE_PASSWORD:Mufasa15/06/2018}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Logging
logging.level.root=INFO